<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --piggy-outline-color: #f3f4f6; /* Light gray for dark theme outline */
      --piggy-accent-color: #d4af37; /* Gold accent color */
    }
    @media (prefers-color-scheme: light) {
      :root {
        --piggy-outline-color: #1f2937; /* Dark gray for light theme outline */
      }
    }
    .piggy-outline { stroke: var(--piggy-outline-color); stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    .piggy-accent { fill: var(--piggy-accent-color); }
    .piggy-accent-stroke { stroke: var(--piggy-accent-color); stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
  </style>
    <!-- Piggy body abstract shield -->
    <path class="piggy-outline" d="M50 80C69.33 80 85 64.33 85 45C85 30 75 20 50 20C25 20 15 30 15 45C15 64.33 30.67 80 50 80Z"/>
    <!-- Coin Slot with Golden Glow -->
    <rect class="piggy-accent" x="46" y="10" width="8" height="20" rx="4"/>
    <!-- Montero Abstract legs on the bottom -->
    <path class="piggy-accent-stroke" d="M35 78V84H43V80"/>
    <path class="piggy-accent-stroke" d="M65 78V84H57V80"/>
    <!-- Central Safe Indicator Dial -->
    <circle class="piggy-accent-stroke" cx="50" cy="50" r="10"/>
    <line class="piggy-accent-stroke" x1="50" y1="40" x2="50" y2="45"/>
</svg>