<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirigiendo...</title>
    <script>
      // Función para obtener la ruta base del repositorio
      function getRepoBase() {
        const path = window.location.pathname;
        const parts = path.split('/');
        // Asumiendo que el nombre del repositorio es el segundo segmento en la URL de GitHub Pages
        // e.g., /test-repo/dashboard -> /test-repo
        if (parts.length > 1 && parts[1] === 'test-repo') {
          return '/' + parts[1] + '/';
        }
        return '/'; // Si no se encuentra el repositorio, asumimos la raíz
      }

      // Redirigir a la base de la aplicación para que React Router tome el control
      const base = getRepoBase();
      window.location.replace(base);
    </script>
  </head>
  <body>
    <p>Si no eres redirigido automáticamente, haz clic <a href="#">aquí</a>.</p>
  </body>
</html>
